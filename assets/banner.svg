<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="200" fill="#0D1117" rx="10"/>

  <!-- Cyberpunk/Terminal Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161B22" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#39FF14" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#grid)" rx="10"/>

  <!-- Terminal Window decorative elements -->
  <circle cx="20" cy="20" r="6" fill="#FF5F56" />
  <circle cx="40" cy="20" r="6" fill="#FFBD2E" />
  <circle cx="60" cy="20" r="6" fill="#27C93F" />
  <text x="85" y="24" font-family="'Fira Code', monospace, Courier" font-size="12" fill="#8B949E">aditya@sys: ~/profile.system.core</text>

  <!-- Title Text -->
  <text x="400" y="100" font-family="'Fira Code', monospace, Courier" font-size="36" font-weight="bold" fill="url(#glow)" text-anchor="middle" letter-spacing="2">ADITYA.SYSTEM.CORE</text>

  <!-- Subtitle -->
  <text x="400" y="130" font-family="'Fira Code', monospace, Courier" font-size="16" fill="#C9D1D9" text-anchor="middle" letter-spacing="1">[ AI ENGINEER // BACKEND ARCHITECT ]</text>

  <!-- Decorative technical lines -->
  <path d="M 100 160 L 320 160 L 330 170 L 470 170 L 480 160 L 700 160" fill="none" stroke="#21262D" stroke-width="2"/>
  <circle cx="100" cy="160" r="4" fill="#00F0FF" />
  <circle cx="700" cy="160" r="4" fill="#39FF14" />
  <line x1="330" y1="170" x2="470" y2="170" stroke="#00F0FF" stroke-width="2" />
</svg>
